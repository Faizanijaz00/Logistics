<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics — Get the App</title>
  <meta name="description" content="Download the Logistics fleet app for Android and iOS." />
  <style>
    :root {
      --bg: #0b0d10;
      --card: #14181d;
      --text: #f5f7fa;
      --muted: #9aa4b2;
      --border: #262c34;
      --accent: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1b2230 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .wrap { width: 100%; max-width: 460px; text-align: center; }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(59,130,246,0.35);
    }
    .logo svg { width: 38px; height: 38px; }
    h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
    .tagline { color: var(--muted); font-size: 16px; margin: 10px 0 34px; line-height: 1.5; }
    .badges { display: flex; flex-direction: column; gap: 14px; }
    .badge {
      display: flex; align-items: center; gap: 14px;
      background: #fff; color: #000;
      border-radius: 14px; padding: 14px 22px;
      text-decoration: none;
      border: 1px solid rgba(0,0,0,0.08);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }
    .badge:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    .badge svg { width: 30px; height: 30px; flex: 0 0 auto; }
    .badge .txt { text-align: left; line-height: 1.1; }
    .badge .small { display: block; font-size: 11px; font-weight: 500; color: #444; }
    .badge .big { display: block; font-size: 20px; font-weight: 700; }
    .badge.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .badge.disabled .small { color: #666; }
    .note { margin-top: 22px; font-size: 13px; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo" aria-hidden="true">
      <!-- car / fleet glyph -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2" />
        <circle cx="7" cy="17" r="2" />
        <path d="M9 17h6" />
        <circle cx="17" cy="17" r="2" />
      </svg>
    </div>

    <h1>Logistics</h1>
    <p class="tagline">Fleet management, simplified.</p>

    <div class="badges">
      <!-- Google Play / Android APK -->
      <a class="badge" id="android" href="#" rel="noopener">
        <svg viewBox="0 0 512 512" aria-hidden="true">
          <path fill="#00D7FE" d="M47 24c-6 3-10 10-10 19v426c0 9 4 16 10 19l248-232L47 24z"/>
          <path fill="#00F076" d="M47 24l248 232 68-64L84 12C69 4 55 12 47 24z"/>
          <path fill="#FFBC00" d="M363 192l-68 64 68 64 89-51c17-11 17-15 0-26l-89-51z"/>
          <path fill="#FF3A44" d="M47 488c8 12 22 20 37 12l279-158-68-64L47 488z"/>
        </svg>
        <span class="txt">
          <span class="small">GET IT ON</span>
          <span class="big">Google Play</span>
        </span>
      </a>

      <!-- App Store (coming soon) -->
      <a class="badge disabled" id="ios" href="#" aria-disabled="true">
        <svg viewBox="0 0 384 512" aria-hidden="true">
          <path fill="#000" d="M318 272c-1-58 48-86 50-87-27-40-70-45-85-46-36-4-70 21-88 21s-46-20-76-20c-39 1-75 23-95 58-40 70-10 173 29 230 19 28 42 59 72 58 29-1 40-19 75-19s45 19 76 18c31 0 51-28 70-56 22-32 31-63 31-65-1-1-60-23-61-91z"/>
          <path fill="#000" d="M259 61c16-19 27-46 24-73-23 1-51 15-67 34-15 17-28 45-24 71 25 2 51-13 67-32z"/>
        </svg>
        <span class="txt">
          <span class="small">Download on the</span>
          <span class="big">App Store</span>
        </span>
      </a>
    </div>

    <p class="note" id="ios-note">iOS is coming soon.</p>
  </main>

  <script>
    // The Android download link is set here so it's easy to swap for the latest
    // build without touching markup. Replace with the newest EAS APK URL.
    var ANDROID_APK_URL = "https://expo.dev/accounts/ivoines242/projects/logistics/builds/9c4c8f7d-6618-4128-95df-029722e7b2be";
    document.getElementById('android').setAttribute('href', ANDROID_APK_URL);
  </script>
</body>
</html>
